name: Real Manager Canary

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: '11 6 * * 1'

jobs:
  real-manager-canary:
    name: Real Manager Canary (Advisory)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run real-manager smoke contract
        env:
          REAL_MANAGER_REPORT_PATH: ${{ runner.temp }}/real-manager-smoke-report.json
        run: |
          set -euo pipefail
          scripts/tests/real_manager_smoke.sh \
            --report-path "${REAL_MANAGER_REPORT_PATH}" \
            | tee "${RUNNER_TEMP}/real-manager-smoke.log"

      - name: Validate real-manager smoke report contract
        env:
          REAL_MANAGER_REPORT_PATH: ${{ runner.temp }}/real-manager-smoke-report.json
        run: |
          python3 - "$REAL_MANAGER_REPORT_PATH" <<'PY'
          import json
          import pathlib
          import sys

          report_path = pathlib.Path(sys.argv[1])
          report = json.loads(report_path.read_text(encoding="utf-8"))
          assert report.get("schema") == "helm.tests.real_manager_smoke_report"
          assert report.get("schema_version") == 1
          assert report.get("overall_status") in {"passed", "failed"}
          manager_results = report.get("manager_results") or []
          assert len(manager_results) == 4
          manager_names = {entry.get("manager") for entry in manager_results}
          assert manager_names == {"homebrew", "node", "python", "ruby"}
          PY

      - name: Upload real-manager canary artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: real-manager-canary-artifacts
          path: |
            ${{ runner.temp }}/real-manager-smoke.log
            ${{ runner.temp }}/real-manager-smoke-report.json
          if-no-files-found: error
